<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civic AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0b1220, #050816);
    color: #e5e7eb;
}

/* APP */
.app {
    width: 92vw;
    height: 92vh;
    display: flex;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 35px 100px rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.08);
}

/* SIDEBAR */
.sidebar {
    width: 300px;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-right: 1px solid rgba(255,255,255,0.06);
}

.logo {
    font-size: 22px;
    font-weight: 800;
    color: #38bdf8;
}

.sub {
    font-size: 12px;
    opacity: 0.65;
    line-height: 1.5;
}

.status {
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 12px;
    opacity: 0.85;
    line-height: 1.6;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: rgba(2,6,23,0.9);
}

/* HEADER */
.header {
    padding: 16px 20px;
    font-weight: 700;
    background: linear-gradient(90deg, #0ea5e9, #6366f1);
}

/* CHAT */
.chatbox {
    flex: 1;
    padding: 22px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* EMPTY */
.empty {
    margin: auto;
    text-align: center;
    opacity: 0.6;
}

/* WRAP */
.wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
}

.user-wrap {
    justify-content: flex-end;
}

/* AVATAR */
.avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 11px;
}

/* MESSAGE */
.msg {
    max-width: 70%;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
}

/* USER */
.user {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border-bottom-right-radius: 4px;
}

/* BOT */
.bot {
    background: rgba(51,65,85,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom-left-radius: 4px;
}

/* 🔥 FIXED TYPING (SMALL + ALIGNED WITH AVATAR) */
.typing-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
}

.typing-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #0ea5e9;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 11px;
}

.typing-box {
    background: rgba(51,65,85,0.9);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px 12px;
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
}

/* SMALL DOTS */
.dot {
    width: 5px;
    height: 5px;
    background: #94a3b8;
    border-radius: 50%;
    animation: bounce 1s infinite;
}

.dot:nth-child(2){ animation-delay: 0.2s; }
.dot:nth-child(3){ animation-delay: 0.4s; }

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
}

/* INPUT */
.input {
    display: flex;
    padding: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(2,6,23,0.6);
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: #0b1220;
    color: white;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 16px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🏛 Civic AI</div>
    <div class="sub">
        AI-powered civic assistant for analyzing and responding to public issues.
    </div>

    <div class="status">
        System: Active<br>
        Engine: RAG + LLM<br>
        Status: Ready
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="header">Civic AI Assistant</div>

    <div id="chat" class="chatbox">
        <div class="empty" id="empty">
            👋 Start by describing a civic issue
        </div>
    </div>

    <div class="input">
        <input id="msg" placeholder="Type your issue..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">Send</button>
    </div>
</div>

</div>

<script>

function addMessage(text, type) {
    document.getElementById("empty")?.remove();

    let chat = document.getElementById("chat");

    let wrap = document.createElement("div");
    wrap.className = "wrap " + (type === "user" ? "user-wrap" : "");

    let avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.innerText = type === "user" ? "U" : "AI";
    avatar.style.background = type === "user" ? "#16a34a" : "#0ea5e9";

    let msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;

    wrap.appendChild(avatar);
    wrap.appendChild(msg);

    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;

    return msg;
}

function typing() {
    let chat = document.getElementById("chat");

    let wrap = document.createElement("div");
    wrap.className = "typing-wrap";

    let avatar = document.createElement("div");
    avatar.className = "typing-avatar";
    avatar.innerText = "AI";

    let box = document.createElement("div");
    box.className = "typing-box";
    box.innerHTML = `
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    `;

    wrap.appendChild(avatar);
    wrap.appendChild(box);

    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;

    return wrap;
}

function send() {
    let input = document.getElementById("msg");
    let val = input.value.trim();
    if(!val) return;

    addMessage(val, "user");
    input.value = "";

    let t = typing();

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: val})
    })
    .then(r => r.json())
    .then(d => {
        t.remove();
        addMessage(d.response, "bot");
    });
}

</script>

</body>
</html>
